      badgeBg: `color-mix(in srgb, var(${g.color}) 15%, var(--surface))`,
      selected: !!picked[name],
      toggle: () => this.setState((s) => ({ picked: { ...s.picked, [name]: !s.picked[name] } })),
    });
    const providerGroups = this.PROVIDER_GROUPS.map((g) => ({
      type: g.type,
      items: g.names.filter((n) => !q || n.toLowerCase().includes(q)).map((n) => mk(n, g)),
    })).filter((g) => g.items.length > 0);
    const selectedCount = Object.values(picked).filter(Boolean).length;
    // --- wizard manual (proposta) ---
    const W = this.WIZARD;
    const wStep = Math.min(this.state.wizStep, W.length - 1);
    const cur = W[wStep];
    const wq = this.state.wizQuery.trim().toLowerCase();
    const wp = this.state.wizPicked;
    const provMap = {};
    W.forEach((g) => g.providers.forEach((pp) => { provMap[pp.name] = pp; }));
    const wizTiles = cur.providers.filter((p) => !wq || p.name.toLowerCase().includes(wq)).map((p) => {
      const val = wp[p.name];
      const hasProducts = Array.isArray(p.products) && p.products.length > 1;
      const sub = val && hasProducts ? (val === '__unsure__' ? 'A confirmar' : val) : '';
      return {
        name: p.name, color: p.color, badge: initials(p.name), domain: p.domain,
        mono: !!p.mono, showLogo: !p.mono,
        fav: `https://www.google.com/s2/favicons?sz=128&domain=${p.domain}`,
        logo: p.svg ? 'https://raw.githubusercontent.com/Tgentil/Bancos-em-SVG/main/' + encodeURI(p.svg) : `https://www.google.com/s2/favicons?sz=128&domain=${p.domain}`,
        selected: !!val,
        sublabel: sub, hasSub: !!sub,
        toggle: hasProducts
          ? () => this.setState({ openSheet: p.name })
          : () => this.setState((s) => { const n = { ...s.wizPicked }; if (n[p.name]) delete n[p.name]; else n[p.name] = true; return { wizPicked: n }; }),
      };
    });
    const estOf = (pp, val) => {
      if (!val) return 0;
      if (pp.products && pp.products.length) {
        if (val === '__unsure__') return Math.max.apply(null, pp.products.map((x) => x.est));
        const f = pp.products.find((x) => x.name === val);
        return f ? f.est : (pp.est || 0);
      }
      return pp.est || 0;
    };
    const economiaSum = Object.keys(wp).filter((n) => wp[n]).reduce((a, n) => a + (provMap[n] ? estOf(provMap[n], wp[n]) : 0), 0);
    const openName = this.state.openSheet;
    const sheetProv = openName ? provMap[openName] : null;
    const sheetProducts = sheetProv && sheetProv.products ? sheetProv.products.map((pr) => ({
      name: pr.name,
      meta: pr.tier + ' · ' + pr.benefits + ' benefícios',
      est: 'R$ ' + pr.est.toLocaleString('pt-BR'),
      recommended: !!pr.recommended,
      selected: wp[openName] === pr.name,
      pick: () => this.setState((s) => ({ wizPicked: { ...s.wizPicked, [openName]: pr.name }, openSheet: null })),
    })) : [];
    const wizSegments = W.map((g, i) => ({ on: i <= wStep, off: i > wStep }));
    // --- resumo do caminho manual (tela 07) ---
    const WIZ_CATS = [
      { label: 'Cartões de crédito', color: '--accent' },
      { label: 'Assinaturas & streaming', color: '--c-compras' },
      { label: 'Saúde', color: '--c-seguro' },
      { label: 'Bancos & carteiras', color: '--c-viagem' },
      { label: 'Milhas & viagens', color: '--c-pontos' },
    ];
    const benefitsOf = (pp, val) => {
      if (!val) return 0;
      if (pp.products && pp.products.length) {
        if (val === '__unsure__') return Math.max.apply(null, pp.products.map((x) => x.benefits || 0));
        const f = pp.products.find((x) => x.name === val);
        return f ? (f.benefits || 3) : 3;
      }
      return 3;
    };
    let summaryBenefits = 0, summaryCount = 0;
    const summaryGroups = W.map((g, gi) => {
      const cat = WIZ_CATS[gi] || { label: g.question, color: '--accent' };
      const items = g.providers.filter((p) => wp[p.name]).map((p) => {
        const val = wp[p.name];
        summaryBenefits += benefitsOf(p, val);
        summaryCount += 1;
        const product = (val && val !== true && val !== '__unsure__') ? val : (val === '__unsure__' ? 'A confirmar' : '');
        return {
          name: p.name, badge: initials(p.name), color: p.color,
          mono: !!p.mono, showLogo: !p.mono,
          fav: `https://www.google.com/s2/favicons?sz=128&domain=${p.domain}`,
          logo: p.svg ? 'https://raw.githubusercontent.com/Tgentil/Bancos-em-SVG/main/' + encodeURI(p.svg) : `https://www.google.com/s2/favicons?sz=128&domain=${p.domain}`,
          product, hasProduct: !!product,
          est: 'R$ ' + estOf(p, val).toLocaleString('pt-BR'),
        };
      });
      return { label: cat.label, dot: `var(${cat.color})`, items };
    }).filter((g) => g.items.length > 0);
    // --- revisão da descoberta Gmail (tela 08) ---
    const REVIEW_EST = [1200, 720, 900, 480, 850, 320, 600];
    const roff = this.state.reviewOff;
    let reviewSum = 0, reviewKept = 0;
    const reviewItems = this.PANEL_BENEFITS.map((b, idx) => {
      const kept = !roff[idx];
      if (kept) { reviewSum += (REVIEW_EST[idx] || 0); reviewKept += 1; }
      return {
        title: b.title,
        origin: b.originLabel,
        dot: `var(--c-${b.category})`,
        est: 'R$ ' + (REVIEW_EST[idx] || 0).toLocaleString('pt-BR'),
        kept,
        opacity: kept ? '1' : '.5',
        toggle: () => this.setState((s) => ({ reviewOff: { ...s.reviewOff, [idx]: !s.reviewOff[idx] } })),
      };
    });
    const reviewTotal = reviewItems.length;
    // --- opt-in de alertas (tela 09) ---
    const al = this.state.alerts;
    const toggleAlert = (k) => this.setState((s) => ({ alerts: { ...s.alerts, [k]: !s.alerts[k] } }));
    const alertsOn = Object.values(al).filter(Boolean).length;
    return {
      theme: this.props.theme ?? 'light',
      showValue: this.props.showValue ?? true,
      panelChips,
      panelPasses,
      panelEmpty: panelPasses.length === 0,
      checklistItems: [
        { label: 'Cartão Ultravioleta identificado no seu radar', done: true },
        { label: 'Baixe o app Priority Pass (gratuito) e crie sua conta', done: false },
        { label: 'Ative com o código enviado pelo Nubank', done: false },
        { label: 'Apresente o cartão digital na entrada da sala VIP', done: false },
      ],
      providerGroups,
      providersEmpty: providerGroups.length === 0,
      onSearch: (e) => this.setState({ query: e.target.value }),
      manualDisabled: selectedCount === 0,
      manualContinueLabel: selectedCount > 0 ? `Continuar (${selectedCount})` : 'Selecione ao menos um',
      wizTiles,
      wizSegments,
      summaryGroups,
      summaryEmpty: summaryGroups.length === 0,
      summaryBenefits,
      summaryCount,
      reviewItems,
      reviewKeptCount: reviewKept,
      reviewTotal,
      reviewValue: 'R$ ' + reviewSum.toLocaleString('pt-BR'),
      reviewCountLabel: reviewKept + ' de ' + reviewTotal + ' incluídos',
      reviewSaveDisabled: reviewKept === 0,
      reviewSaveLabel: reviewKept > 0 ? `Salvar ${reviewKept} no meu radar  →` : 'Inclua ao menos um',
      alertNovos: al.novos, notNovos: !al.novos,
      alertPrazo: al.prazo, notPrazo: !al.prazo,
      alertResumo: al.resumo, notResumo: !al.resumo,
      toggleNovos: () => toggleAlert('novos'),
      togglePrazo: () => toggleAlert('prazo'),
      toggleResumo: () => toggleAlert('resumo'),
      alertsCtaLabel: alertsOn > 0 ? 'Ativar alertas  →' : 'Continuar sem alertas  →',
      wizEyebrow: cur.eyebrow,
      wizQuestion: cur.question,
      wizQuery: this.state.wizQuery,
      wizEmpty: wizTiles.length === 0,
      canPrev: wStep > 0,
      noPrev: wStep === 0,
      wizCtaLabel: wStep >= W.length - 1 ? 'Concluir' : 'Continuar',
      economia: 'R$ ' + economiaSum.toLocaleString('pt-BR'),
      imgError: (e) => {
        const img = e.target, fav = img.getAttribute('data-fav');
        if (fav && !img.dataset.triedFav && img.src !== fav) { img.dataset.triedFav = '1'; img.src = fav; return; }
        img.style.display = 'none';
        const m = img.previousElementSibling; if (m) m.style.visibility = 'visible';
      },
      sheetOpen: !!sheetProv,
      sheetTitle: sheetProv ? `Qual o seu ${sheetProv.name}?` : '',
      sheetProducts,
      closeSheet: () => this.setState({ openSheet: null }),
      pickUnsure: () => this.setState((s) => ({ wizPicked: { ...s.wizPicked, [openName]: '__unsure__' }, openSheet: null })),
      wizPrev: () => this.setState((s) => ({ wizStep: Math.max(0, s.wizStep - 1), wizQuery: '' })),
      wizNext: () => this.setState((s) => ({ wizStep: Math.min(W.length - 1, s.wizStep + 1), wizQuery: '' })),
      wizSkip: () => this.setState((s) => ({ wizStep: Math.min(W.length - 1, s.wizStep + 1), wizQuery: '' })),
      onWizSearch: (e) => this.setState({ wizQuery: e.target.value }),
      isGmail: sel === 'gmail',
      isManual: sel === 'manual',
      selectGmail: () => this.setState({ selected: 'gmail' }),
      selectManual: () => this.setState({ selected: 'manual' }),
      continueLabel: sel === 'gmail' ? 'Conectar Gmail  →' : 'Adicionar cartões  →',
      blips,
      chips,
      scanCount: count,
      scanLabel: done ? 'Tudo pronto!' : this.SCAN_LABELS[this.state.labelIdx % this.SCAN_LABELS.length],
      scanProgressPct: prog + '%',
      scanDone: done,
      scanning: !done,
      noop: () => {},
    };
  }
}
</script>
