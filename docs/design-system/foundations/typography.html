<!-- @dsCard group="Fundamentos" name="Tipografia — Onest" -->
<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#F6F6F3;--surface:#FFFFFF;--ink:#15161B;--ink-2:#3A3B42;--muted:#8A8B92;
    --line:#ECEBE6;--line-2:#F2F1EC;--accent:#2B44FF;--accent-soft:#EDEFFF;
    --radius:20px;--r-sm:14px;--shadow:0 1px 2px rgba(21,22,27,.04),0 10px 26px -18px rgba(21,22,27,.22);
    --font:'Onest',system-ui,sans-serif;--warn:#B4631A;--warn-bg:#FCEFDD;
    --c-airport:#2B44FF;--c-seguro:#0E9F6E;--c-viagem:#0CA3B2;--c-cashback:#E08A0E;--c-compras:#7A5AF8;--c-pontos:#E5447E;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--bg);letter-spacing:-.01em;-webkit-font-smoothing:antialiased;padding:24px}
  .canvas{max-width:360px}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 12px}
  .muted{color:var(--muted)}
  /* pass */
  .pass{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:18px;margin:0 0 12px;box-shadow:var(--shadow);overflow:hidden}
  .pass .edge{position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--cat,#2B44FF)}
  .pass .stub{padding:14px 15px 12px 18px}
  .pass .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .pass .via{font-size:12px;color:var(--muted);font-weight:500}.pass .via b{color:var(--ink);font-weight:700}
  .tag{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 8px;border-radius:7px;color:var(--cat,#2B44FF);background:color-mix(in srgb,var(--cat,#2B44FF) 12%,#fff)}
  .pass h3{font-size:17px;font-weight:700;letter-spacing:-.02em;line-height:1.16;margin:0 0 5px}
  .pass .d{font-size:13px;line-height:1.45;color:var(--ink-2);margin:0}
  .pass .perf{position:relative;height:0;border-top:2px dashed var(--line);margin:0 12px}
  .pass .perf::before,.pass .perf::after{content:"";position:absolute;top:-10px;width:18px;height:18px;border-radius:50%;background:var(--bg)}
  .pass .perf::before{left:-22px;box-shadow:inset 0 0 0 1px var(--line)}.pass .perf::after{right:-22px;box-shadow:inset 0 0 0 1px var(--line)}
  .pass .foot{padding:11px 15px 12px 18px;display:flex;align-items:center;justify-content:space-between}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:5px 9px;border-radius:999px}
  .pill.iss{color:#0E9F6E;background:#E6F6EF}.pill.brand{color:#2B44FF;background:#EDEFFF}.pill.part{color:#E08A0E;background:#FCF1DF}
  .go{width:31px;height:31px;border-radius:10px;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:14px}
  .new{font-size:10px;font-weight:700;color:#fff;background:var(--c-pontos);padding:3px 7px;border-radius:6px}
  /* chips */
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:#fff;border-radius:11px;padding:8px 12px;font-size:12.5px;font-weight:600;color:var(--ink-2);display:inline-flex;gap:6px;align-items:center}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip i{width:8px;height:8px;border-radius:50%;display:inline-block}
  /* buttons */
  .btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:14px;border-radius:13px;background:var(--accent);color:#fff;font-weight:700;font-size:14.5px;border:none;box-shadow:0 10px 22px -12px rgba(43,68,255,.7);margin-bottom:10px}
  .btn.ink{background:var(--ink);box-shadow:none}.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none}
  /* rows / input */
  .row{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);padding:13px;color:var(--ink);font-weight:600;font-size:14px;margin-bottom:7px}
  .input{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px 13px;font-size:14px;color:var(--muted);margin-bottom:10px}
  /* nav */
  .nav{background:#fff;border:1px solid var(--line);border-radius:18px;display:flex;align-items:center;justify-content:space-around;padding:12px 0}
  .nav a{color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;font-weight:600;text-decoration:none}
  .nav a.on{color:var(--ink)}.nav a.on .ic{color:var(--accent)}.ic{font-size:18px}
  /* alert / checklist / seg / skeleton */
  .alert{display:flex;gap:10px;background:var(--warn-bg);border:1px solid #f0d8b6;border-radius:13px;padding:12px;font-size:12.5px;color:var(--warn);line-height:1.45;font-weight:500}
  .check{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;color:var(--ink-2);padding:9px 0;border-bottom:1px solid var(--line-2)}
  .check .bx{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);flex:none;display:grid;place-items:center;color:var(--accent);font-size:12px}
  .check .bx.dn{background:var(--accent);border-color:var(--accent);color:#fff}
  .seg{display:flex;background:#fff;border:1px solid var(--line);border-radius:12px;padding:3px;gap:2px}
  .seg span{flex:1;text-align:center;font-size:12px;font-weight:700;color:var(--muted);padding:8px 4px;border-radius:9px}
  .seg span.on{background:var(--ink);color:#fff}
  @keyframes sh{0%{background-position:-200px 0}100%{background-position:200px 0}}
  .sk{background:linear-gradient(90deg,#efeee9 25%,#f6f5f1 37%,#efeee9 63%);background-size:400px 100%;animation:sh 1.3s infinite;border-radius:8px}
  .sw{height:54px;border-radius:12px;border:1px solid var(--line);display:flex;align-items:flex-end;padding:7px;font-size:10.5px;font-weight:700;color:#fff}
  .swrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
  .ty{margin:0 0 10px;letter-spacing:-.03em;font-weight:700}
</style></head><body><div class="canvas">

<p class="lbl">Tipografia · Onest (escala de partida)</p>
<p class="ty" style="font-size:40px;font-weight:800;line-height:1">23</p>
<p class="ty" style="font-size:25px">Título de tela</p>
<p class="ty" style="font-size:17px">Título do card</p>
<p class="ty" style="font-size:14px;font-weight:500;color:var(--ink-2)">Corpo — descrição do benefício em texto secundário.</p>
<p class="lbl">Eyebrow / label</p>

</div></body></html>
